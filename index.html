<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="训练睡眠记录" />
<link rel="manifest" href="./manifest.webmanifest" />
<title>训练 · 睡眠记录</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: "PingFang SC", "Helvetica Neue", -apple-system, sans-serif;
    color: var(--text, #2B2B26);
    padding: calc(44px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
    background-color: var(--bg, #F6F4EF);
    background-image: var(--bg-image, none);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.06em; color: #8A7B5E; margin-bottom: 2px; }
  h1 { font-size: 22px; font-weight: 700; margin: 0; }
  .weekNav { display: flex; align-items: center; gap: 6px; }
  .navBtn { border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.7); border-radius: 8px; width: 28px; height: 28px; font-size: 14px; cursor: pointer; color: var(--text, #5B5444); }
  .weekLabel { font-size: 12px; color: var(--accent, #8A7B5E); min-width: 78px; text-align: center; }
  .themeBtn {
    border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.7);
    border-radius: 10px; width: 32px; height: 32px; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; margin-left: 8px;
  }
  .summaryRow { display: flex; gap: 10px; margin-bottom: 12px; }
  .summaryCard { flex: 1; background: rgba(255,255,255,0.75); backdrop-filter: blur(8px); border-radius: 14px; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.05); text-align: center; }
  .summaryNum { font-size: 22px; font-weight: 700; color: var(--accent, #B5764A); }
  .summaryLabel { font-size: 11px; color: #8A7B5E; margin-top: 2px; }
  .dayStrip { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
  .dayPill {
    flex: 1 0 auto; min-width: 42px; padding: 6px 0; font-size: 13px;
    border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.7);
    color: #5B5444; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .dayPill.active { border-color: var(--accent, #B5764A); box-shadow: 0 0 0 1px var(--accent, #B5764A) inset; }
  .dayPill.done { background: rgba(255,255,255,0.95); }
  .checkDot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent, #B5764A); }
  .card { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-radius: 18px; padding: 16px; border: 1px solid rgba(0,0,0,0.05); }
  .cardHeadRow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .cardTitle { font-size: 16px; font-weight: 700; margin: 0; }
  .doneToggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #5B5444; cursor: pointer; }
  .doneToggle input { width: 16px; height: 16px; accent-color: var(--accent, #B5764A); }
  .itemList { list-style: none; padding: 0; margin: 0 0 12px; }
  .itemRow { font-size: 14px; color: #3D3A30; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
  .itemDash { color: var(--accent, #C9A06B); margin-right: 8px; }
  .fieldGroup { margin-bottom: 12px; }
  .fieldLabel { font-size: 12px; color: #8A7B5E; margin-bottom: 6px; }
  .scaleRow { display: flex; gap: 6px; flex-wrap: wrap; }
  .scaleBtn { font-size: 12px; padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.7); color: #5B5444; cursor: pointer; }
  .scaleBtn.active { background: var(--accent, #B5764A); color: #fff; border-color: var(--accent, #B5764A); }
  textarea {
    width: 100%; min-height: 56px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.08);
    padding: 10px; font-size: 13px; font-family: inherit; resize: vertical; background: rgba(255,255,255,0.7);
  }
  .saveHint { font-size: 11px; color: #B7AE94; text-align: right; min-height: 14px; margin-top: 4px; }
  .headActions { display: flex; align-items: center; gap: 10px; }
  .editBtn {
    font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.7); color: #8A7B5E; cursor: pointer;
  }
  .editPanel { background: rgba(250,248,243,0.85); border-radius: 12px; padding: 14px; margin-bottom: 18px; border: 1px solid rgba(0,0,0,0.05); }
  .textInput {
    width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08);
    font-size: 14px; font-family: inherit; box-sizing: border-box; background: rgba(255,255,255,0.85);
  }
  .editItemRow { display: flex; gap: 6px; margin-bottom: 6px; }
  .editItemRow input { flex: 1; }
  .removeItemBtn {
    border: 1px solid rgba(0,0,0,0.08); background: #fff; color: var(--accent, #B5764A); border-radius: 8px;
    width: 32px; font-size: 16px; cursor: pointer; flex-shrink: 0;
  }
  .addItemBtn {
    font-size: 12px; padding: 6px 10px; border-radius: 8px; border: 1px dashed var(--accent, #C9A06B);
    background: transparent; color: var(--accent, #B5764A); cursor: pointer; margin-top: 4px;
  }
  .editActionsRow { display: flex; gap: 8px; margin-top: 14px; }
  .saveEditBtn {
    flex: 1; padding: 9px 0; border-radius: 8px; border: none; background: var(--accent, #B5764A);
    color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .cancelEditBtn {
    flex: 1; padding: 9px 0; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); background: #fff;
    color: #8A7B5E; font-size: 13px; cursor: pointer;
  }

  /* theme panel */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none;
    align-items: flex-end; justify-content: center; z-index: 50;
  }
  .overlay.open { display: flex; }
  .themePanel {
    background: #fff; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom)); max-height: 80vh; overflow-y: auto;
  }
  .themePanelTitle { font-size: 16px; font-weight: 700; margin: 0 0 14px; color: #2B2B26; }
  .themeSectionLabel { font-size: 12px; color: #8A7B5E; margin: 16px 0 8px; }
  .swatchRow { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch {
    width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
    flex-shrink: 0;
  }
  .swatch.selected { border-color: #2B2B26; }
  .wallpaperGrid { display: flex; gap: 10px; flex-wrap: wrap; }
  .wallpaperThumb {
    width: 68px; height: 68px; border-radius: 12px; cursor: pointer; border: 2px solid transparent;
    background-size: cover; background-position: center; flex-shrink: 0;
  }
  .wallpaperThumb.selected { border-color: #2B2B26; }
  .wallpaperThumb.none { display: flex; align-items: center; justify-content: center; font-size: 11px; color: #8A7B5E; background: #F2EFE6; }
  .uploadBtn {
    width: 68px; height: 68px; border-radius: 12px; border: 1.5px dashed #C9A06B;
    display: flex; align-items: center; justify-content: center; font-size: 20px; color: #C9A06B;
    cursor: pointer; flex-shrink: 0; background: transparent;
  }
  .closeThemeBtn {
    width: 100%; padding: 11px 0; border-radius: 10px; border: none; margin-top: 18px;
    background: var(--accent, #B5764A); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="eyebrow">低精力适配周</div>
      <h1>训练 · 睡眠记录</h1>
    </div>
    <div class="weekNav">
      <button class="navBtn" id="prevWeek">←</button>
      <span class="weekLabel" id="weekLabel"></span>
      <button class="navBtn" id="nextWeek">→</button>
      <button class="themeBtn" id="themeBtn">🎨</button>
    </div>
  </div>

  <div class="summaryRow">
    <div class="summaryCard">
      <div class="summaryNum" id="completedCount">0/7</div>
      <div class="summaryLabel">本周完成</div>
    </div>
    <div class="summaryCard">
      <div class="summaryNum" id="avgEnergy">—</div>
      <div class="summaryLabel">平均精力</div>
    </div>
  </div>

  <div class="dayStrip" id="dayStrip"></div>

  <div class="card">
    <div class="cardHeadRow">
      <h2 class="cardTitle" id="cardTitle"></h2>
      <div class="headActions">
        <button class="editBtn" id="editBtn">编辑</button>
        <label class="doneToggle">
          <input type="checkbox" id="doneCheckbox" />
          完成训练
        </label>
      </div>
    </div>
    <ul class="itemList" id="itemList"></ul>

    <div class="editPanel" id="editPanel" style="display:none;">
      <div class="fieldGroup">
        <div class="fieldLabel">训练标题</div>
        <input type="text" id="planLabelInput" class="textInput" />
      </div>
      <div class="fieldGroup">
        <div class="fieldLabel">动作列表</div>
        <div id="editItemList"></div>
        <button class="addItemBtn" id="addItemBtn">+ 添加动作</button>
      </div>
      <div class="editActionsRow">
        <button class="saveEditBtn" id="saveEditBtn">保存修改</button>
        <button class="cancelEditBtn" id="cancelEditBtn">取消</button>
      </div>
    </div>

    <div class="fieldGroup">
      <div class="fieldLabel">今日精力</div>
      <div class="scaleRow" id="energyRow"></div>
    </div>

    <div class="fieldGroup">
      <div class="fieldLabel">昨晚睡眠</div>
      <div class="scaleRow" id="sleepRow"></div>
    </div>

    <div class="fieldGroup">
      <div class="fieldLabel">备注（口渴 / 憋尿醒 / 做梦 / 其他感受）</div>
      <textarea id="noteInput" placeholder="记录今天的身体感受……"></textarea>
    </div>

    <div class="saveHint" id="saveHint"></div>
  </div>
</div>

<div class="overlay" id="themeOverlay">
  <div class="themePanel">
    <h3 class="themePanelTitle">外观设置</h3>

    <div class="themeSectionLabel">主题色</div>
    <div class="swatchRow" id="colorSwatches"></div>

    <div class="themeSectionLabel">壁纸</div>
    <div class="wallpaperGrid" id="wallpaperGrid">
      <button class="uploadBtn" id="uploadWallpaperBtn">+</button>
    </div>
    <input type="file" id="wallpaperFileInput" accept="image/*" />

    <button class="closeThemeBtn" id="closeThemeBtn">完成</button>
  </div>
</div>

<script>
const DAYS = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
const DEFAULT_PLANS = {
  '周一': { label: '力量Ⓐ 下肢', items: ['高脚杯深蹲 2×12', '罗马尼亚硬拉 2×12', '臀桥 2×15'] },
  '周二': { label: '二区间有氧', items: ['快走 20分钟（轻度）'] },
  '周三': { label: '力量Ⓑ 上肢肩背', items: ['俯身划船 2×12', '肩外旋 2×15', '地板卧推 2×12'] },
  '周四': { label: '休息 / 拉伸', items: ['可直接跳过有氧', '轻度拉伸（可选）'] },
  '周五': { label: '力量Ⓒ 核心骨盆', items: ['箭步蹲 2×10/侧', '平板支撑 2×30秒', '死虫式 2×10'] },
  '周六': { label: '休息', items: ['完全休息'] },
  '周日': { label: '休息', items: ['完全休息'] },
};
const ENERGY_LABELS = ['很差', '偏差', '一般', '还行', '不错'];
const SLEEP_LABELS = ['几乎没睡', '断断续续', '一般', '比较稳', '很安稳'];
const STORAGE_PREFIX = 'training_tracker_week_';
const PLANS_KEY = 'training_tracker_plans';
const THEME_KEY = 'training_tracker_theme';
const WALLPAPER_SELECTED_KEY = 'training_tracker_wallpaper_selected';
const WALLPAPERS_KEY = 'training_tracker_wallpapers';

const COLOR_THEMES = [
  { name: '燕麦', accent: '#B5764A', bg: '#F6F4EF', text: '#2B2B26' },
  { name: '蜜桃', accent: '#C98A99', bg: '#FBF5F2', text: '#3D2B2E' },
  { name: '鼠尾草', accent: '#7C9885', bg: '#F3F6F1', text: '#2C342D' },
  { name: '薰衣草', accent: '#9D8AC9', bg: '#F5F2FA', text: '#2E2A3D' },
  { name: '雾蓝', accent: '#6E93A8', bg: '#EFF5F7', text: '#222E33' },
  { name: '墨夜', accent: '#D9A05B', bg: '#22242B', text: '#EDEAE2' },
];

const PRESET_WALLPAPERS = [
  { name: '无', value: 'none' },
  { name: '渐变燕麦', value: 'linear-gradient(160deg, #F8F3E9 0%, #F6F4EF 50%, #EFE7D8 100%)' },
  { name: '渐变粉', value: 'linear-gradient(160deg, #FDEDEF 0%, #FBF5F2 50%, #F3E9E4 100%)' },
  { name: '渐变绿', value: 'linear-gradient(160deg, #EAF2E8 0%, #F3F6F1 50%, #E6EFE3 100%)' },
  { name: '渐变蓝', value: 'linear-gradient(160deg, #E6F0F4 0%, #EFF5F7 50%, #DCE9EE 100%)' },
];

let theme = COLOR_THEMES[0];
let wallpaper = 'none';
let customWallpapers = [];

let PLANS = {};

function loadPlans() {
  try {
    const raw = localStorage.getItem(PLANS_KEY);
    PLANS = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_PLANS));
  } catch (e) {
    PLANS = JSON.parse(JSON.stringify(DEFAULT_PLANS));
  }
}

function savePlans() {
  try {
    localStorage.setItem(PLANS_KEY, JSON.stringify(PLANS));
  } catch (e) {
    console.error('保存训练计划失败', e);
  }
}

function loadTheme() {
  try {
    const t = localStorage.getItem(THEME_KEY);
    if (t) theme = JSON.parse(t);
  } catch (e) {}
  try {
    const w = localStorage.getItem(WALLPAPER_SELECTED_KEY);
    if (w) wallpaper = w;
  } catch (e) {}
  try {
    const cw = localStorage.getItem(WALLPAPERS_KEY);
    customWallpapers = cw ? JSON.parse(cw) : [];
  } catch (e) { customWallpapers = []; }
}

function saveTheme() { localStorage.setItem(THEME_KEY, JSON.stringify(theme)); }
function saveWallpaperSelection() { localStorage.setItem(WALLPAPER_SELECTED_KEY, wallpaper); }
function saveCustomWallpapers() { localStorage.setItem(WALLPAPERS_KEY, JSON.stringify(customWallpapers)); }

function applyTheme() {
  document.documentElement.style.setProperty('--accent', theme.accent);
  document.documentElement.style.setProperty('--bg', theme.bg);
  document.documentElement.style.setProperty('--text', theme.text);
  let bgImage = 'none';
  if (wallpaper && wallpaper !== 'none') {
    bgImage = wallpaper.startsWith('data:image') ? `url(${wallpaper})` : wallpaper;
  }
  document.documentElement.style.setProperty('--bg-image', bgImage);
}

function renderThemePanel() {
  const colorRow = document.getElementById('colorSwatches');
  colorRow.innerHTML = '';
  COLOR_THEMES.forEach(t => {
    const sw = document.createElement('button');
    sw.className = 'swatch' + (theme.name === t.name ? ' selected' : '');
    sw.style.background = t.accent;
    sw.title = t.name;
    sw.onclick = () => { theme = t; saveTheme(); applyTheme(); renderThemePanel(); };
    colorRow.appendChild(sw);
  });

  const wallGrid = document.getElementById('wallpaperGrid');
  wallGrid.innerHTML = '';
  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'uploadBtn';
  uploadBtn.textContent = '+';
  uploadBtn.onclick = () => document.getElementById('wallpaperFileInput').click();
  wallGrid.appendChild(uploadBtn);

  PRESET_WALLPAPERS.forEach(w => {
    const thumb = document.createElement('button');
    thumb.className = 'wallpaperThumb' + (wallpaper === w.value ? ' selected' : '') + (w.value === 'none' ? ' none' : '');
    if (w.value === 'none') {
      thumb.textContent = '无';
    } else {
      thumb.style.backgroundImage = w.value;
    }
    thumb.onclick = () => { wallpaper = w.value; saveWallpaperSelection(); applyTheme(); renderThemePanel(); };
    wallGrid.appendChild(thumb);
  });

  customWallpapers.forEach((dataUrl) => {
    const thumb = document.createElement('button');
    thumb.className = 'wallpaperThumb' + (wallpaper === dataUrl ? ' selected' : '');
    thumb.style.backgroundImage = `url(${dataUrl})`;
    thumb.onclick = () => { wallpaper = dataUrl; saveWallpaperSelection(); applyTheme(); renderThemePanel(); };
    wallGrid.appendChild(thumb);
  });
}

function getWeekKey(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - (day === 0 ? 6 : day - 1);
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0, 10);
}
function todayLabel() {
  const idx = new Date().getDay();
  return DAYS[idx === 0 ? 6 : idx - 1];
}

let weekKey = getWeekKey(new Date());
let activeDay = todayLabel();
let records = {};
let isEditing = false;
let draftItems = [];

function loadWeek() {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + weekKey);
    records = raw ? JSON.parse(raw) : {};
  } catch (e) {
    records = {};
  }
}

function saveWeek() {
  try {
    localStorage.setItem(STORAGE_PREFIX + weekKey, JSON.stringify(records));
    document.getElementById('saveHint').textContent = '已自动保存';
    setTimeout(() => { document.getElementById('saveHint').textContent = ''; }, 1500);
  } catch (e) {
    document.getElementById('saveHint').textContent = '保存失败';
  }
}

function updateDay(day, patch) {
  records[day] = { ...(records[day] || {}), ...patch };
  saveWeek();
  renderSummary();
  renderDayStrip();
}

function renderHeader() {
  document.getElementById('weekLabel').textContent = weekKey + ' 周';
}

function renderSummary() {
  const completed = DAYS.filter(d => records[d]?.done).length;
  document.getElementById('completedCount').textContent = completed + '/7';
  const vals = DAYS.map(d => records[d]?.energy).filter(v => typeof v === 'number');
  const avg = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
  document.getElementById('avgEnergy').textContent = avg;
}

function renderDayStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  DAYS.forEach(day => {
    const r = records[day];
    const btn = document.createElement('button');
    btn.className = 'dayPill' + (day === activeDay ? ' active' : '') + (r?.done ? ' done' : '');
    btn.innerHTML = '<span>' + day + '</span>' + (r?.done ? '<span class="checkDot"></span>' : '');
    btn.onclick = () => { activeDay = day; isEditing = false; renderAll(); };
    strip.appendChild(btn);
  });
}

function renderCard() {
  const plan = PLANS[activeDay];
  const rec = records[activeDay] || {};
  document.getElementById('cardTitle').textContent = activeDay + ' · ' + plan.label;
  document.getElementById('doneCheckbox').checked = !!rec.done;
  document.getElementById('doneCheckbox').onchange = (e) => updateDay(activeDay, { done: e.target.checked });

  const itemList = document.getElementById('itemList');
  const editPanel = document.getElementById('editPanel');

  if (isEditing) {
    itemList.style.display = 'none';
    editPanel.style.display = 'block';
    document.getElementById('planLabelInput').value = plan.label;
    renderEditItems();
  } else {
    itemList.style.display = 'block';
    editPanel.style.display = 'none';
    itemList.innerHTML = '';
    plan.items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'itemRow';
      li.innerHTML = '<span class="itemDash">—</span>' + escapeHtml(item);
      itemList.appendChild(li);
    });
  }

  const energyRow = document.getElementById('energyRow');
  energyRow.innerHTML = '';
  ENERGY_LABELS.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'scaleBtn' + (rec.energy === i + 1 ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => updateDay(activeDay, { energy: i + 1 });
    energyRow.appendChild(btn);
  });

  const sleepRow = document.getElementById('sleepRow');
  sleepRow.innerHTML = '';
  SLEEP_LABELS.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'scaleBtn' + (rec.sleep === i + 1 ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => updateDay(activeDay, { sleep: i + 1 });
    sleepRow.appendChild(btn);
  });

  const noteInput = document.getElementById('noteInput');
  noteInput.value = rec.note || '';
  noteInput.oninput = (e) => updateDay(activeDay, { note: e.target.value });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderEditItems() {
  const container = document.getElementById('editItemList');
  container.innerHTML = '';
  draftItems.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'editItemRow';
    const input = document.createElement('input');
    input.className = 'textInput';
    input.value = item;
    input.oninput = (e) => { draftItems[idx] = e.target.value; };
    const removeBtn = document.createElement('button');
    removeBtn.className = 'removeItemBtn';
    removeBtn.textContent = '×';
    removeBtn.onclick = () => { draftItems.splice(idx, 1); renderEditItems(); };
    row.appendChild(input);
    row.appendChild(removeBtn);
    container.appendChild(row);
  });
}

function enterEditMode() {
  isEditing = true;
  draftItems = [...PLANS[activeDay].items];
  renderCard();
}

function exitEditMode() {
  isEditing = false;
  renderCard();
}

function saveEdit() {
  const newLabel = document.getElementById('planLabelInput').value.trim() || PLANS[activeDay].label;
  const cleanedItems = draftItems.map(i => i.trim()).filter(Boolean);
  PLANS[activeDay] = { label: newLabel, items: cleanedItems.length ? cleanedItems : ['（暂无动作，点编辑添加）'] };
  savePlans();
  isEditing = false;
  renderCard();
}

function renderAll() {
  renderHeader();
  renderSummary();
  renderDayStrip();
  renderCard();
  applyTheme();
}

document.getElementById('prevWeek').onclick = () => {
  const d = new Date(weekKey);
  d.setDate(d.getDate() - 7);
  weekKey = getWeekKey(d);
  loadWeek();
  renderAll();
};
document.getElementById('nextWeek').onclick = () => {
  const d = new Date(weekKey);
  d.setDate(d.getDate() + 7);
  weekKey = getWeekKey(d);
  loadWeek();
  renderAll();
};

document.getElementById('editBtn').onclick = enterEditMode;
document.getElementById('cancelEditBtn').onclick = exitEditMode;
document.getElementById('saveEditBtn').onclick = saveEdit;
document.getElementById('addItemBtn').onclick = () => { draftItems.push(''); renderEditItems(); };

const themeOverlay = document.getElementById('themeOverlay');
document.getElementById('themeBtn').onclick = () => { renderThemePanel(); themeOverlay.classList.add('open'); };
document.getElementById('closeThemeBtn').onclick = () => themeOverlay.classList.remove('open');
themeOverlay.onclick = (e) => { if (e.target === themeOverlay) themeOverlay.classList.remove('open'); };

document.getElementById('wallpaperFileInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    customWallpapers.push(dataUrl);
    try {
      saveCustomWallpapers();
    } catch (err) {
      alert('图片太大，存储失败，换一张小一点的图试试');
      customWallpapers.pop();
      return;
    }
    wallpaper = dataUrl;
    saveWallpaperSelection();
    applyTheme();
    renderThemePanel();
  };
  reader.readAsDataURL(file);
};

loadPlans();
loadTheme();
loadWeek();
renderAll();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
